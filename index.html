<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <title>Dead By Daylight</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <body>
    <header>
        <img src="img/headerLogo.png" id="imgLogo">

        <button class="btn-header">Home</button>
        <button class="btn-header" onclick="learnMore()">Learn More</button>
        <button class="btn-header" onclick="redirecionarReddit()">Forum</button>
        <button class="btn-header" onclick="redirecionarDiscord()">Discord</button>
        <button id="btn-jogar" onclick="redirecionar()">Play Now</button>
    </header>

    <corpo>
        <img src="img/bgGif.gif" id="gifBG">
        <img src="img/mainImg.png" id="mainImg">

        <button id="buyHome" onclick="exibirTrailer()">Watch Trailer</button>
        <div id="trailer"></div>

        <div id="learnMore">
            <div class="card">
                <img src="img/survLogo.png">
                <button class="btn-gameFunctions" id="btnSurv">Play as Survivor</button>
            </div>

            <div class="card">
                <img src="img/killerLogo.png">
                <button class="btn-gameFunctions" id="btnKiller">Play as Killer</button>
            </div>
        </div>

        <!-- MODAL SURVIVOR -->
        <dialog id="modalSurvivor">
            <h2>Survivors</h2>

            <div class="lista-personagens">
                <div class="personagem">
                    <p>Dustin Henderson</p>
                    <button onclick="abrirDLC('Dustin')">Ver DLC</button>
                </div>

                <div class="personagem">
                    <p>Rick Grimes</p>
                    <button onclick="abrirDLC('Rick')">Ver DLC</button>
                </div>

                <div class="personagem">
                    <p>Leon S. Kennedy</p>
                    <button onclick="abrirDLC('Leon')">Ver DLC</button>
                </div>

                <div class="personagem">
                    <p>Nicolas Cage</p>
                    <button onclick="abrirDLC('Nicolas')">Ver DLC</button>
                </div>
            </div>

            <button onclick="fecharModal('modalSurvivor')">Fechar</button>
        </dialog>

        <!-- MODAL KILLER -->
        <dialog id="modalKiller">
            <h2>Killers</h2>

            <div class="lista-personagens">
                <div class="personagem">
                    <p>Vecna</p>
                    <button onclick="abrirDLC('Vecna')">Ver DLC</button>
                </div>

                <div class="personagem">
                    <p>Springtrap</p>
                    <button onclick="abrirDLC('Springtrap')">Ver DLC</button>
                </div>

                <div class="personagem">
                    <p>Leatherface</p>
                    <button onclick="abrirDLC('Leatherface')">Ver DLC</button>
                </div>

                <div class="personagem">
                    <p>Krasue</p>
                    <button onclick="abrirDLC('Krasue')">Ver DLC</button>
                </div>
            </div>

            <button onclick="fecharModal('modalKiller')">Fechar</button>
        </dialog>

    </corpo>

    <footer>
        <p>Desenvolvido por João Conrad & Murilo Conterato</p>
        <p>Obrigado por visitar nosso site</p>
    </footer>
</body>

</body>

</html>
